<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/photos/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Mountain Park Pool - Sign In</title>
</head>

<body class="bg-cream">
    <main class="min-h-screen flex flex-col items-center justify-center px-6 py-10">

        <!-- Logo -->
        <div class="flex flex-col items-center gap-2 mb-8">
            <a href="/"><img src="/photos/logo.png" alt="Mountain Park Pool"
                    class="w-16 h-16 object-cover rounded-xl border-3 border-mustard" /></a>
            <p class="font-header font-bold text-xl text-waterblue">Mountain Park Pool</p>
            <p class="text-xs font-semibold tracking-[2px] uppercase text-darkblue opacity-50">Member Portal</p>
        </div>

        <!-- Card -->
        <div id="resetPwCard" class="w-full max-w-sm bg-cream border border-mustard rounded-2xl p-7 flex flex-col gap-5 shadow-sm">

            <div class="flex flex-col gap-1">
                <h1 class="font-header font-bold text-2xl text-darkblue">Password Reset</h1>
                <p id="guideText" class="text-sm text-darkblue/50">Enter the email used during sign-up to reset your password</p>
            </div>

            <div class="bg-mustard w-full h-[1.5px]"></div>

            <!-- Error message -->
            <div id="resetError"
                class="hidden text-sm text-red-500 font-semibold">
                Invalid email or password. Please try again.
            </div>

            <!-- Email -->
            <div id="emailField" class="flex flex-col gap-1.5">
                <label for="loginEmail" class="text-xs font-bold uppercase tracking-widest text-darkblue">Email
                    Address</label>
                <input type="email" id="loginEmail" required autocomplete="email" placeholder="example@email.com"
                    class="rounded-lg border border-mustard bg-white px-4 py-3 text-sm text-darkblue placeholder:text-darkblue/30 focus:outline-none focus:ring-2 focus:ring-waterblue" />
            </div>

            <!-- Password -->
            <div id="passwordField" class="flex flex-col gap-1.5 hidden">
                <label for="newPassword"
                    class="text-xs font-bold uppercase tracking-widest text-darkblue">New Password</label>
                <input type="password" id="newPassword" required autocomplete="current-password"
                    placeholder="Your new password" minlength="8"
                    class="rounded-lg border border-mustard bg-white px-4 py-3 text-sm text-darkblue placeholder:text-darkblue/30 focus:outline-none focus:ring-2 focus:ring-waterblue" />
            </div>

            

            <!-- Submit -->
            <button id="resetBtn" type="button"
                class="w-full bg-waterblue text-white font-bold uppercase tracking-widest text-sm py-4 rounded-xl hover:bg-waterblue-dark transition-all">
                Reset Password
            </button>

            <div class="flex items-center gap-3 text-xs text-darkblue/40 font-semibold uppercase tracking-widest">
                <div class="flex-1 h-[1px] bg-mustard"></div>
                or
                <div class="flex-1 h-[1px] bg-mustard"></div>
            </div>

            <p class="text-center text-sm text-darkblue/60">
                
                <a href="/" class="text-burnedorange font-bold underline">Back to home →</a>
            </p>

        </div>

        
    

    </main>

    <script src="main.js" type="module"></script>
</body>

</html>
