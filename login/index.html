<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Mountain Park Pool - Sign In</title>
</head>

<body class="bg-cream">
    <main class="min-h-screen flex flex-col items-center justify-center px-6 py-10">

        <!-- Logo -->
        <div class="flex flex-col items-center gap-2 mb-8">
            <a href="/"><img src="/photos/logo.png" alt="Mountain Park Pool"
                    class="w-16 h-16 object-cover rounded-xl border-3 border-mustard" /></a>
            <p class="font-header font-bold text-xl text-waterblue">Mountain Park Pool</p>
            <p class="text-xs font-semibold tracking-[2px] uppercase text-darkblue opacity-50">Member Portal</p>
        </div>

        <!-- Card -->
        <div class="w-full max-w-sm bg-cream border border-mustard rounded-2xl p-7 flex flex-col gap-5 shadow-sm">

            <div class="flex flex-col gap-1">
                <h1 class="font-header font-bold text-2xl text-darkblue">Welcome back</h1>
                <p class="text-sm text-darkblue/50">Sign in to your membership account</p>
            </div>

            <div class="bg-mustard w-full h-[1.5px]"></div>

            <!-- Error message -->
            <div id="loginError"
                class="hidden bg-red-100 border border-red-300 rounded-lg px-4 py-3 text-sm text-red-800 font-semibold">
                Invalid email or password. Please try again.
            </div>

            <!-- Email -->
            <div class="flex flex-col gap-1.5">
                <label for="loginEmail" class="text-xs font-bold uppercase tracking-widest text-darkblue">Email
                    Address</label>
                <input type="email" id="loginEmail" required autocomplete="email" placeholder="maria@email.com"
                    class="rounded-lg border border-mustard bg-white px-4 py-3 text-sm text-darkblue placeholder:text-darkblue/30 focus:outline-none focus:ring-2 focus:ring-waterblue" />
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-1.5">
                <label for="loginPassword"
                    class="text-xs font-bold uppercase tracking-widest text-darkblue">Password</label>
                <input type="password" id="loginPassword" required autocomplete="current-password"
                    placeholder="Your password"
                    class="rounded-lg border border-mustard bg-white px-4 py-3 text-sm text-darkblue placeholder:text-darkblue/30 focus:outline-none focus:ring-2 focus:ring-waterblue" />
            </div>

            <!-- Forgot password -->
            <div class="flex justify-end -mt-3">
                <button id="forgotPassword" type="button"
                    class="text-xs font-semibold text-darkblue/50 underline hover:text-darkblue transition-colors">
                    Forgot password?
                </button>
            </div>

            <!-- Submit -->
            <button id="loginBtn" type="button"
                class="w-full bg-waterblue text-white font-bold uppercase tracking-widest text-sm py-4 rounded-xl hover:bg-waterblue-dark transition-all">
                Sign In
            </button>

            <div class="flex items-center gap-3 text-xs text-darkblue/40 font-semibold uppercase tracking-widest">
                <div class="flex-1 h-[1px] bg-mustard"></div>
                or
                <div class="flex-1 h-[1px] bg-mustard"></div>
            </div>

            <p class="text-center text-sm text-darkblue/60">
                Not a member yet?
                <a href="/join/" class="text-burnedorange font-bold underline">Join the pool →</a>
            </p>

        </div>

        <!-- Season badge -->
        <div id="seasonBadge"
            class="mt-6 inline-flex items-center gap-2 bg-cream border border-mustard rounded-full px-4 py-1.5 text-xs font-semibold text-darkblue">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            <span id="seasonText">2026 Season Open · May 25 – Sep 7</span>
        </div>

    </main>

    <script src="main.js" type="module"></script>
</body>

</html>
